###############################################
# MediaMTX - YT Appliance WebRTC Preview
###############################################

logLevel: info

webrtc: yes
webrtcAddress: :8889
webrtcLocalUDPAddress: :8189
# webrtcIPsFromInterfaces: no — startup script injects the real LAN IP.
# STUN (webrtcICEServers2) resolves the public/WAN IP automatically at
# connection time, so this works on any network without hardcoding.
webrtcIPsFromInterfaces: no
webrtcAdditionalHosts: []
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302

paths:
  stream:
    # Fed by yt_bridge.sh via RTSP push
