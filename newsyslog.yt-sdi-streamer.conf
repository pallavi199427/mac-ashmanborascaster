# Rotate streamer logs daily or when size exceeded, keep 1 archive
# Format: logfile mode count size(KB) when flags
#
# --- Uplink (yt_sdi_streamer) ---
/var/log/yt-sdi-streamer/events.jsonl        644  1  51200  *  J
/var/log/yt-sdi-streamer/ffmpeg.log          644  1  51200  *  J
/var/log/yt-sdi-streamer/launchd.out         644  1  10240  *  J
/var/log/yt-sdi-streamer/launchd.err         644  1  10240  *  J
/var/log/yt-sdi-streamer/alerts.log          644  1  10240  *  J
/var/log/yt-sdi-streamer/alerts_events.jsonl 644  1  10240  *  J
/var/log/yt-sdi-streamer/ffmpeg.progress    644  1  10240  *  J
#
# --- Ingest ---
/var/log/yt-sdi-streamer/ingest_ffmpeg.log       644  1  51200  *  J
/var/log/yt-sdi-streamer/ingest_events.jsonl     644  1  10240  *  J
/var/log/yt-sdi-streamer/ingest_launchd.out      644  1  10240  *  J
/var/log/yt-sdi-streamer/ingest_launchd.err      644  1  10240  *  J
/var/log/yt-sdi-streamer/ingest_ffmpeg.progress  644  1  10240  *  J
#
# --- Bridge ---
/var/log/yt-sdi-streamer/bridge_ffmpeg.log   644  1  10240  *  J
/var/log/yt-sdi-streamer/bridge_launchd.out  644  1  10240  *  J
/var/log/yt-sdi-streamer/bridge_launchd.err  644  1  10240  *  J
#
# --- Network Hardening (one-shot) ---
/var/log/yt-sdi-streamer/netharden.log          644  1  10240  *  J
/var/log/yt-sdi-streamer/netharden_launchd.out  644  1  10240  *  J
/var/log/yt-sdi-streamer/netharden_launchd.err  644  1  10240  *  J
#
# --- MediaMTX ---
/var/log/yt-sdi-streamer/mediamtx_launchd.out 644  1  10240  *  J
/var/log/yt-sdi-streamer/mediamtx_launchd.err 644  1  10240  *  J
#
# --- Dashboard ---
/var/log/yt-sdi-streamer/dashboard.out       644  1  10240  *  J
/var/log/yt-sdi-streamer/dashboard.err       644  1  10240  *  J
