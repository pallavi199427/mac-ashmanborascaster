# Rotate streamer logs daily or when size exceeded, keep 14 archives
# Format: logfile mode count size(KB) when flags
#
# --- Uplink (yt_sdi_streamer) ---
/var/log/yt-sdi-streamer/events.jsonl        644  14  51200  *  J
/var/log/yt-sdi-streamer/ffmpeg.log          644  14  51200  *  J
/var/log/yt-sdi-streamer/launchd.out         644  14  10240  *  J
/var/log/yt-sdi-streamer/launchd.err         644  14  10240  *  J
/var/log/yt-sdi-streamer/alerts.log          644  14  10240  *  J
/var/log/yt-sdi-streamer/alerts_events.jsonl 644  14  10240  *  J
#
# --- Ingest ---
/var/log/yt-sdi-streamer/ingest_ffmpeg.log       644  14  51200  *  J
/var/log/yt-sdi-streamer/ingest_events.jsonl     644  14  10240  *  J
/var/log/yt-sdi-streamer/ingest_launchd.out      644  14  10240  *  J
/var/log/yt-sdi-streamer/ingest_ffmpeg.progress  644  14  10240  *  J
#
# --- Bridge ---
/var/log/yt-sdi-streamer/bridge_ffmpeg.log   644  14  10240  *  J
/var/log/yt-sdi-streamer/bridge_launchd.out  644  14  10240  *  J
/var/log/yt-sdi-streamer/bridge_launchd.err  644  14  10240  *  J
#
# --- MediaMTX ---
/var/log/yt-sdi-streamer/mediamtx_launchd.out 644  14  10240  *  J
/var/log/yt-sdi-streamer/mediamtx_launchd.err 644  14  10240  *  J
#
# --- Dashboard ---
/var/log/yt-sdi-streamer/dashboard.out       644  14  10240  *  J
/var/log/yt-sdi-streamer/dashboard.err       644  14  10240  *  J
