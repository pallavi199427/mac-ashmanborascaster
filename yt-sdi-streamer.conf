###############################################################################
# /etc/yt-sdi-streamer.conf  Appliance config
#
# SECURITY:
# - STREAM_KEY is a credential. Installer copies this file to /etc with mode 600.
###############################################################################

# --- FFmpeg binary ---
FFMPEG_BIN="/usr/local/bin/ffmpeg"

# --- Multicast (ingest → uplink/bridge) ---
MULTICAST_IP="239.20.0.10"
MULTICAST_PORT=5000
MULTICAST_TTL=1
MULTICAST_PKT_SIZE=1316

# --- MediaMTX (bridge → WebRTC preview) ---
MEDIAMTX_RTSP_URL="rtsp://localhost:8554/stream"

# --- Uplink mode ---
# false = remux (copy), true = re-encode (uses bitrate ladder + videotoolbox)
UPLINK_REENCODE=false

# --- YouTube RTMP ---
YOUTUBE_RTMP_URL="rtmp://a.rtmp.youtube.com/live2"
STREAM_KEY="YOUR-STREAM-KEY-HERE"  # SECRET — do not commit real keys
PLAYBACK_URL=""                        # YouTube playback URL (for future use)

# --- DeckLink input ---
DECKLINK_DEVICE="UltraStudio Recorder 3G"
FORMAT_CODE="Hi50"               # e.g. 1080i50 (top-field-first)
VIDEO_INPUT="sdi"
AUDIO_INPUT="embedded"

# --- Output resolution (synced from active profile) ---
# Used in LIVE_VIDEO_FILTER scale and STANDBY_SIZE
OUTPUT_RESOLUTION="1920x1080"

# --- Live video processing (1080i50 -> 1080p50) ---
# scale uses OUTPUT_RESOLUTION: replace x with : for ffmpeg scale filter
LIVE_VIDEO_FILTER="bwdif=mode=1:parity=tff:deint=all,fps=25,scale=1920:1080:flags=lanczos,format=yuv420p"

# --- Output color metadata ---
COLOR_PRIMARIES="bt709"
COLOR_TRC="bt709"
COLOR_SPACE="bt709"

# --- GOP for YouTube (2 seconds at 25fps => 50) ---
GOP=50
KEYINT_MIN=50

# --- Bitrate ladder (start MAX, fallback SAFE) ---
BITRATE_MAX_K="4000k"
BUFSIZE_MAX_K="4000k"

BITRATE_SAFE_K="2500k"
BUFSIZE_SAFE_K="2500k"

DOWNGRADE_AFTER_CONSECUTIVE_FAILURES=3

# --- Audio ---
# Use "aac" unless you KNOW your ffmpeg build includes libfdk_aac.
AUDIO_CODEC="libfdk_aac"         # aac | libfdk_aac
AUDIO_BITRATE_K="160k"           # used when AUDIO_CODEC=aac

AUDIO_RATE=48000
AUDIO_CHANNELS=2
FDK_VBR_MODE=5                    # used when AUDIO_CODEC=libfdk_aac

# --- Standby / Slate mode ---
ENABLE_STANDBY=false
STANDBY_SIZE="${OUTPUT_RESOLUTION:-1920x1080}"
STANDBY_FPS=25
STANDBY_BG_COLOR="black"

# Logo overlay (PNG recommended)
LOGO_ENABLE=true
LOGO_PATH="/var/lib/yt-sdi-streamer/logo.png"
LOGO_X=60
LOGO_Y=60

# Text / clock overlay
FONT_FILE="/System/Library/Fonts/Supplemental/Arial.ttf"
CLOCK_TZ="Asia/Kolkata"

STANDBY_TITLE="STANDBY"
STANDBY_SUBTITLE="Live will resume shortly"

TEXT_X=80
TEXT_Y=520

TITLE_FONTSIZE=84
CLOCK_FONTSIZE=56
SUBTITLE_FONTSIZE=42

CLOCK_DY=120
SUBTITLE_DY=200

# --- Switching behavior (anti-flap hysteresis) ---
PROBE_INTERVAL=2
SWITCH_TO_STANDBY_AFTER=2
SWITCH_TO_LIVE_AFTER=2

# --- No-signal watchdog (live mode) ---
MAX_NO_SIGNAL_LINES=5

# --- Restart / backoff ---
RESTART_BACKOFF_SECONDS=3
RESTART_BACKOFF_MAX_SECONDS=60

# --- Logging ---
LOG_DIR="/var/log/yt-sdi-streamer"
MAX_EVENTS_LOG_MB=200
MAX_FFMPEG_LOG_MB=500

# --- Output-stall watchdog (FFmpeg -progress) ---
ENABLE_OUTPUT_STALL_WATCHDOG=true
STALL_TIMEOUT_SECONDS=25
STALL_CHECK_INTERVAL=5

# --- Metrics cadence ---
METRICS_INTERVAL=1
NET_METRICS_INTERVAL=10

# Optional ping health (adds a tiny bit of load)
ENABLE_NET_PING=true
PING_TARGET="8.8.8.8"
PING_COUNT=3

# --- Alerts (helper scripts) ---
LIB_DIR="/usr/local/lib/yt-sdi-streamer"
ALERTS_DIR="/usr/local/lib/yt-sdi-streamer/alerts"
ALERT_SCRIPT="/usr/local/lib/yt-sdi-streamer/alerts/alert.sh"

# --- Network hardening ---
DO_NETWORK_HARDENING=true

NETWORK_SERVICE="USB 10/100/1000 LAN"

ENFORCE_SERVICE_ORDER=true
SERVICE_ORDER=("USB 10/100/1000 LAN" "Wi-Fi" "Thunderbolt Bridge" "iPhone USB")

SET_DNS=true
DNS_SERVERS=("1.1.1.1" "1.0.0.1" "8.8.8.8" "8.8.4.4")

DISABLE_WIFI_DURING_RUN=true
DISABLE_SLEEP=true

# Optional MTU (leave empty to skip)
MTU_VALUE=""

